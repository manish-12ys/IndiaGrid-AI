services:
  - type: web
    name: indiagrid-ai
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn 'backend.app:create_app()'"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.12.0
      - key: GEMINI_API_KEY
        sync: false # Prompts you to enter this securely in the Render dashboard
